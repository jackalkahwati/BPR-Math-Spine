  rg.append("stop").attr("offset", "100%").attr("stop-color", "#0a0a0a").attr("stop-opacity", 0);

  // Glow filter
  const filter = defs.append("filter").attr("id", "glow").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
  filter.append("feGaussianBlur").attr("in", "SourceGraphic").attr("stdDeviation", "3").attr("result", "blur");
  const merge = filter.append("feMerge");
  merge.append("feMergeNode").attr("in", "blur");
  merge.append("feMergeNode").attr("in", "SourceGraphic");

  const g = svg.append("g").attr("transform", `translate(${cx},${cy})`);

  // Background glow
  g.append("circle").attr("r", radius * 0.15).attr("fill", "url(#centerGlow)").attr("opacity", 0.6);

  // Create hierarchy
  const root = d3.hierarchy(data);

  // Custom radial layout
  const sectorCount = root.children.length;
  const sectorAngle = (2 * Math.PI) / sectorCount;

  // Assign angles and radii
  root.x = 0; root.y = 0; root.angle = 0; root.radius = 0;

  root.children.forEach((sector, si) => {
    const baseAngle = si * sectorAngle - Math.PI / 2;
    sector.angle = baseAngle;
    sector.radius = radius * 0.22;
    sector.x = Math.cos(baseAngle) * sector.radius;
    sector.y = Math.sin(baseAngle) * sector.radius;

    if (sector.children) {
      const modCount = sector.children.length;
      const spread = sectorAngle * 0.85;
      sector.children.forEach((mod, mi) => {
        const modAngle = baseAngle - spread / 2 + (spread / Math.max(modCount - 1, 1)) * mi;
        mod.angle = modAngle;
        mod.radius = radius * 0.50;
        mod.x = Math.cos(modAngle) * mod.radius;
        mod.y = Math.sin(modAngle) * mod.radius;

        if (mod.children) {
          const predCount = mod.children.length;
          const predSpread = (spread / modCount) * 0.9;
          mod.children.forEach((pred, pi) => {
            const predAngle = modAngle - predSpread / 2 + (predSpread / Math.max(predCount - 1, 1)) * pi;
            pred.angle = predAngle;
            pred.radius = radius * 0.88;
            pred.x = Math.cos(predAngle) * pred.radius;
            pred.y = Math.sin(predAngle) * pred.radius;
          });
        }
      });
    }
  });

  // Collect all nodes flat
  const allNodes = [];
  const allLinks = [];

  function traverse(node, parent) {
    allNodes.push(node);
    if (parent) {
      allLinks.push({ source: parent, target: node });
    }
    if (node.children) {
      node.children.forEach(c => traverse(c, node));
    }
  }
  traverse(root, null);

  // Get sector color for any node
  function getSectorColor(node) {
    if (node === root) return "#fff";
    let n = node;
    while (n.parent && n.parent !== root) n = n.parent;
    return (n.data && COLORS[n.data.name]) || "#888";
  }

  // Draw ring guides
  [0.22, 0.50, 0.88].forEach(r => {
    g.append("circle")
      .attr("r", radius * r)
      .attr("fill", "none")
      .attr("stroke", "rgba(255,255,255,0.04)")
      .attr("stroke-width", 0.5);
  });

  // Draw links
  g.selectAll(".link")
    .data(allLinks)
    .join("path")
    .attr("class", "link")
    .attr("d", d => {
      const sx = d.source.x, sy = d.source.y;
      const tx = d.target.x, ty = d.target.y;
      const mx = (sx + tx) / 2, my = (sy + ty) / 2;
      // Slight curve toward center
      const cx2 = mx * 0.9, cy2 = my * 0.9;
      return `M${sx},${sy} Q${cx2},${cy2} ${tx},${ty}`;
    })
    .attr("fill", "none")
    .attr("stroke", d => {
      const c = getSectorColor(d.target);
      return c;
    })
    .attr("stroke-opacity", d => d.target.depth <= 2 ? 0.2 : 0.08)
    .attr("stroke-width", d => d.target.depth <= 1 ? 1.5 : d.target.depth <= 2 ? 0.8 : 0.4);

  // Draw prediction nodes (depth 3)
  const predictions = allNodes.filter(n => n.depth === 3);
  g.selectAll(".pred")
    .data(predictions)
    .join("circle")
    .attr("class", "pred")
    .attr("cx", d => d.x)
    .attr("cy", d => d.y)
    .attr("r", 3)
    .attr("fill", d => getSectorColor(d))
    .attr("opacity", 0.7)
    .attr("filter", "url(#glow)")
    .on("mouseenter", (event, d) => showTooltip(event, d))
    .on("mouseleave", hideTooltip);

  // Prediction labels
  g.selectAll(".pred-label")
    .data(predictions)
    .join("text")
    .attr("class", "pred-label")
    .attr("x", d => {
      const offset = d.angle > -Math.PI / 2 && d.angle < Math.PI / 2 ? 6 : -6;
      return d.x + offset;
    })
    .attr("y", d => d.y + 3)
    .attr("text-anchor", d => d.angle > -Math.PI / 2 && d.angle < Math.PI / 2 ? "start" : "end")
    .attr("fill", d => getSectorColor(d))
    .attr("opacity", 0.55)
    .attr("font-size", "7px")
    .attr("font-family", "'Courier New', monospace")
    .text(d => d.data.name.length > 20 ? d.data.name.slice(0, 20) + "\u2026" : d.data.name)
    .on("mouseenter", (event, d) => showTooltip(event, d))
    .on("mouseleave", hideTooltip);

  // Draw module nodes (depth 2)
  const modules = allNodes.filter(n => n.depth === 2);
  g.selectAll(".mod")
    .data(modules)
    .join("circle")
    .attr("class", "mod")
    .attr("cx", d => d.x)
    .attr("cy", d => d.y)
    .attr("r", 5)
    .attr("fill", d => getSectorColor(d))
    .attr("opacity", 0.85)
    .attr("filter", "url(#glow)")
    .on("mouseenter", (event, d) => showTooltip(event, d))
    .on("mouseleave", hideTooltip);

  // Module labels
  g.selectAll(".mod-label")
    .data(modules)
    .join("text")
    .attr("class", "mod-label")
    .attr("x", d => {
      const offset = d.angle > -Math.PI / 2 && d.angle < Math.PI / 2 ? 9 : -9;
      return d.x + offset;
    })
    .attr("y", d => d.y + 3)
    .attr("text-anchor", d => d.angle > -Math.PI / 2 && d.angle < Math.PI / 2 ? "start" : "end")
    .attr("fill", d => getSectorColor(d))
    .attr("opacity", 0.8)
    .attr("font-size", "9px")
    .attr("font-weight", "500")
    .text(d => d.data.name)
    .on("mouseenter", (event, d) => showTooltip(event, d))
    .on("mouseleave", hideTooltip);

  // Draw sector nodes (depth 1)
  const sectors = allNodes.filter(n => n.depth === 1);
  g.selectAll(".sector")
    .data(sectors)
    .join("circle")
    .attr("class", "sector")
    .attr("cx", d => d.x)
    .attr("cy", d => d.y)
    .attr("r", 10)
    .attr("fill", d => COLORS[d.data.name])
    .attr("opacity", 0.9)
    .attr("filter", "url(#glow)")
    .on("mouseenter", (event, d) => showTooltip(event, d))
    .on("mouseleave", hideTooltip);

  // Sector labels
  g.selectAll(".sector-label")
    .data(sectors)
    .join("text")
    .attr("class", "sector-label")
    .attr("x", d => d.x)
    .attr("y", d => d.y - 16)
    .attr("text-anchor", "middle")
    .attr("fill", d => COLORS[d.data.name])
    .attr("font-size", "13px")
    .attr("font-weight", "700")
    .attr("letter-spacing", "1px")
    .text(d => d.data.name)
    .on("mouseenter", (event, d) => showTooltip(event, d))
    .on("mouseleave", hideTooltip);

  // Center node
  g.append("circle")
    .attr("cx", 0).attr("cy", 0).attr("r", 18)
    .attr("fill", "rgba(126,207,255,0.15)")
    .attr("stroke", "#7ecfff")
    .attr("stroke-width", 1.5)
    .attr("filter", "url(#glow)");

  g.append("text")
    .attr("x", 0).attr("y", -2)
    .attr("text-anchor", "middle")
    .attr("fill", "#fff")
    .attr("font-size", "11px")
    .attr("font-weight", "600")
    .text("S_\u2202");

  g.append("text")
    .attr("x", 0).attr("y", 10)
    .attr("text-anchor", "middle")
    .attr("fill", "#7ecfff")
    .attr("font-size", "7px")
    .text("Boundary");

  // Legend
  const legend = d3.select("#legend");
  legend.selectAll("*").remove();
  Object.entries(COLORS).forEach(([name, color]) => {
    const item = legend.append("div").attr("class", "legend-item");
    item.append("span").attr("class", "legend-dot").style("background", color);
    item.append("span").text(name).style("color", color);
  });
}

function showTooltip(event, d) {
  const data = d.data;
  let html = `<div class="tt-name">${data.fullName || data.name}</div>`;
  if (data.desc) html += `<div class="tt-desc">${data.desc}</div>`;
  if (data.eq)   html += `<div class="tt-eq">${data.eq}</div>`;
  if (data.val)  html += `<div class="tt-val">Value: ${data.val}</div>`;
  if (data.pred) html += `<div class="tt-val" style="color:#aaa">ID: ${data.pred}</div>`;

  tooltip.html(html)
    .style("opacity", 1)
    .style("left", (event.pageX + 14) + "px")
    .style("top", (event.pageY - 10) + "px");
}

function hideTooltip() {
  tooltip.style("opacity", 0);
}

render();
window.addEventListener("resize", render);
</script>
</body>
</html>
