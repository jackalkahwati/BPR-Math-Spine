  { source: "boundary_action", target: "multiscale", pipeline: -1 },
  { source: "boundary_action", target: "metric", pipeline: -1 },
  { source: "boundary_action", target: "decoherence", pipeline: -1 },

  // Multiscale connects to emergent spacetime (cross-scale gravity)
  { source: "multiscale", target: "emergent_spacetime", pipeline: -1 },
  { source: "multiscale", target: "electromechanical", pipeline: -1 },
];

// ---------------------------------------------------------------------------
// GRAPH SETUP
// ---------------------------------------------------------------------------
const width = window.innerWidth;
const height = window.innerHeight;
let labelsVisible = true;

const svg = d3.select("#graph")
  .append("svg")
  .attr("width", width)
  .attr("height", height);

// Gradient background
const defs = svg.append("defs");
const bgGrad = defs.append("radialGradient")
  .attr("id", "bg-gradient")
  .attr("cx", "50%").attr("cy", "50%").attr("r", "60%");
bgGrad.append("stop").attr("offset", "0%").attr("stop-color", "#111118");
bgGrad.append("stop").attr("offset", "100%").attr("stop-color", "#0a0a0a");
svg.append("rect").attr("width", width).attr("height", height).attr("fill", "url(#bg-gradient)");

// Glow filter for nodes
const glowFilter = defs.append("filter").attr("id", "glow").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
glowFilter.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "blur");
const glowMerge = glowFilter.append("feMerge");
glowMerge.append("feMergeNode").attr("in", "blur");
glowMerge.append("feMergeNode").attr("in", "SourceGraphic");

// Arrow marker
defs.append("marker")
  .attr("id", "arrowhead")
  .attr("viewBox", "0 -3 6 6")
  .attr("refX", 18).attr("refY", 0)
  .attr("markerWidth", 5).attr("markerHeight", 5)
  .attr("orient", "auto")
  .append("path")
  .attr("d", "M0,-3L6,0L0,3")
  .attr("fill", "#555");

const g = svg.append("g");

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.2, 5])
  .on("zoom", (event) => g.attr("transform", event.transform));
svg.call(zoom);

function resetZoom() {
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);
}

function toggleLabels() {
  labelsVisible = !labelsVisible;
  g.selectAll(".node-label").attr("opacity", labelsVisible ? 1 : 0);
}

// ---------------------------------------------------------------------------
// NODE SIZE
// ---------------------------------------------------------------------------
function nodeRadius(d) {
  if (d.layer === 7) return 6;   // Predictions — small
  if (d.layer === 6) return 13;  // Unification — large
  if (d.layer === 0) return 12;  // Substrate — large
  return 10;                     // Everything else
}

// ---------------------------------------------------------------------------
// FORCE SIMULATION
// ---------------------------------------------------------------------------
// Deduplicate edges (some cross-links duplicate pipeline edges)
const edgeSet = new Set();
const edges = [];
edgeData.forEach(e => {
  const key = e.source + "|" + e.target;
  if (!edgeSet.has(key)) {
    edgeSet.add(key);
    edges.push({ ...e });
  }
});

const simulation = d3.forceSimulation(nodeData)
  .force("link", d3.forceLink(edges).id(d => d.id).distance(d => {
    if (d.pipeline >= 0) return 80;
    return 120;
  }).strength(d => d.pipeline >= 0 ? 0.7 : 0.3))
  .force("charge", d3.forceManyBody().strength(d => d.layer === 7 ? -120 : -300))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 8))
  .force("x", d3.forceX(width / 2).strength(0.03))
  .force("y", d3.forceY(height / 2).strength(0.03))
  .alphaDecay(0.015);

// ---------------------------------------------------------------------------
// DRAW EDGES
// ---------------------------------------------------------------------------
const link = g.append("g")
  .selectAll("line")
  .data(edges)
  .join("line")
  .attr("stroke", d => d.pipeline >= 0 ? pipelineColors[d.pipeline] : "#333")
  .attr("stroke-opacity", d => d.pipeline >= 0 ? 0.5 : 0.2)
  .attr("stroke-width", d => d.pipeline >= 0 ? 1.5 : 0.8)
  .attr("marker-end", "url(#arrowhead)");

// ---------------------------------------------------------------------------
// DRAW NODES
// ---------------------------------------------------------------------------
const node = g.append("g")
  .selectAll("g")
  .data(nodeData)
  .join("g")
  .attr("class", "node-group")
  .call(d3.drag()
    .on("start", dragStarted)
    .on("drag", dragged)
    .on("end", dragEnded));

node.append("circle")
  .attr("r", d => nodeRadius(d))
  .attr("fill", d => layerColors[d.layer])
  .attr("fill-opacity", 0.85)
  .attr("stroke", d => d3.color(layerColors[d.layer]).brighter(0.8))
  .attr("stroke-width", d => (d.layer === 0 || d.layer === 6) ? 2 : 1)
  .attr("filter", d => d.layer <= 6 ? "url(#glow)" : null)
  .style("cursor", "pointer");

node.append("text")
  .attr("class", "node-label")
  .attr("dy", d => nodeRadius(d) + 13)
  .attr("text-anchor", "middle")
  .attr("fill", "#ccc")
  .attr("font-size", d => d.layer === 7 ? "9px" : "10px")
  .attr("font-weight", d => (d.layer === 0 || d.layer === 6) ? "600" : "400")
  .attr("pointer-events", "none")
  .text(d => d.label);

// ---------------------------------------------------------------------------
// TOOLTIP
// ---------------------------------------------------------------------------
const tooltip = d3.select("#tooltip");

node.on("mouseenter", (event, d) => {
  tooltip.style("display", "block")
    .html(`
      <div class="tt-name">${d.label}</div>
      <div class="tt-layer">${layerNames[d.layer]} (layer ${d.layer})</div>
      <div class="tt-eq">${d.eq}</div>
    `);
})
.on("mousemove", (event) => {
  tooltip
    .style("left", (event.pageX + 14) + "px")
    .style("top", (event.pageY - 14) + "px");
})
.on("mouseleave", () => {
  tooltip.style("display", "none");
});

// ---------------------------------------------------------------------------
// CLICK — highlight connected
// ---------------------------------------------------------------------------
let selectedNode = null;

node.on("click", (event, d) => {
  event.stopPropagation();
  if (selectedNode === d.id) {
    selectedNode = null;
    resetHighlight();
    return;
  }
  selectedNode = d.id;

  const connected = new Set([d.id]);
  edges.forEach(e => {
    const sid = typeof e.source === "object" ? e.source.id : e.source;
    const tid = typeof e.target === "object" ? e.target.id : e.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });

  node.select("circle")
    .attr("fill-opacity", n => connected.has(n.id) ? 1 : 0.15)
    .attr("stroke-opacity", n => connected.has(n.id) ? 1 : 0.15);
  node.select("text")
    .attr("opacity", n => connected.has(n.id) ? 1 : 0.15);

  link
    .attr("stroke-opacity", e => {
      const sid = typeof e.source === "object" ? e.source.id : e.source;
      const tid = typeof e.target === "object" ? e.target.id : e.target;
      return (sid === d.id || tid === d.id) ? 0.8 : 0.04;
    })
    .attr("stroke-width", e => {
      const sid = typeof e.source === "object" ? e.source.id : e.source;
      const tid = typeof e.target === "object" ? e.target.id : e.target;
      return (sid === d.id || tid === d.id) ? 2.5 : 0.5;
    });
});

svg.on("click", () => {
  selectedNode = null;
  resetHighlight();
});

function resetHighlight() {
  node.select("circle")
    .attr("fill-opacity", 0.85)
    .attr("stroke-opacity", 1);
  node.select("text")
    .attr("opacity", labelsVisible ? 1 : 0);
  link
    .attr("stroke-opacity", d => d.pipeline >= 0 ? 0.5 : 0.2)
    .attr("stroke-width", d => d.pipeline >= 0 ? 1.5 : 0.8);
}

// ---------------------------------------------------------------------------
// DRAG
// ---------------------------------------------------------------------------
function dragStarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x; d.fy = event.y;
}
function dragEnded(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ---------------------------------------------------------------------------
// TICK
// ---------------------------------------------------------------------------
simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// ---------------------------------------------------------------------------
// RESIZE
// ---------------------------------------------------------------------------
window.addEventListener("resize", () => {
  const w = window.innerWidth, h = window.innerHeight;
  svg.attr("width", w).attr("height", h);
  svg.select("rect").attr("width", w).attr("height", h);
  simulation.force("center", d3.forceCenter(w / 2, h / 2));
  simulation.alpha(0.3).restart();
});
</script>
</body>
</html>
