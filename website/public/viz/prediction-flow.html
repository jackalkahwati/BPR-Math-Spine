  }
  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;

// ============================================================

const nodes = rawNodes.map(n => ({...n, name: n.label}));
const links = rawLinks.map(l => ({
  source: l[0],
  target: l[1],
  value:  l[2],
  equation: l[3],
  extra: l[4],
}));

// ============================================================
//  RENDER
// ============================================================

const container = document.getElementById('chart');
const margin = { top: 40, right: 240, bottom: 30, left: 20 };

function render() {
  // Clear
  container.innerHTML = '';

  const fullW = container.clientWidth;
  const fullH = Math.max(window.innerHeight - 120, 1600);
  const width = fullW - margin.left - margin.right;
  const height = fullH - margin.top - margin.bottom;

  const svg = d3.select('#chart')
    .append('svg')
    .attr('width', fullW)
    .attr('height', fullH);

  const g = svg.append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

  // Column labels
  const colLabels = ['INPUTS', 'DERIVED CONSTANTS', 'INTERMEDIATE THEORIES', 'PREDICTIONS'];
  const colX = [0, width * 0.18, width * 0.50, width * 0.85];

  colLabels.forEach((label, i) => {
    g.append('text')
      .attr('class', 'col-label')
      .attr('x', colX[i] + 40)
      .attr('y', -14)
      .text(label);
  });

  // Sankey generator
  const sankey = d3.sankey()
    .nodeId(d => d.id)
    .nodeWidth(18)
    .nodePadding(5)
    .nodeAlign(d3.sankeyLeft)
    .nodeSort((a, b) => a.col === b.col ? a.index - b.index : 0)
    .extent([[0, 0], [width, height]]);

  // Deep copy for sankey mutation
  const graph = sankey({
    nodes: nodes.map(d => ({...d})),
    links: links.map(d => ({...d})),
  });

  // Defs for gradients
  const defs = svg.append('defs');

  graph.links.forEach((link, i) => {
    const grad = defs.append('linearGradient')
      .attr('id', `lg-${i}`)
      .attr('gradientUnits', 'userSpaceOnUse')
      .attr('x1', link.source.x1)
      .attr('x2', link.target.x0);

    grad.append('stop')
      .attr('offset', '0%')
      .attr('stop-color', link.source.color)
      .attr('stop-opacity', 0.6);

    grad.append('stop')
      .attr('offset', '100%')
      .attr('stop-color', link.target.color)
      .attr('stop-opacity', 0.6);
  });

  // Tooltip
  const tooltip = d3.select('#tooltip');

  function showTooltip(evt, html) {
    tooltip.html(html)
      .style('opacity', 1)
      .style('left', Math.min(evt.pageX + 14, window.innerWidth - 380) + 'px')
      .style('top', (evt.pageY - 20) + 'px');
  }
  function hideTooltip() {
    tooltip.style('opacity', 0);
  }

  // Links
  const linkG = g.append('g')
    .attr('fill', 'none')
    .attr('stroke-opacity', 0.45)
    .selectAll('g')
    .data(graph.links)
    .join('g');

  linkG.append('path')
    .attr('d', d3.sankeyLinkHorizontal())
    .attr('stroke', (d, i) => `url(#lg-${i})`)
    .attr('stroke-width', d => Math.max(1.5, d.width))
    .style('mix-blend-mode', 'screen')
    .style('cursor', 'pointer')
    .on('mouseover', function(evt, d) {
      d3.select(this).attr('stroke-opacity', 0.85).raise();
      const html = `<div class="tt-title">${d.source.label} \u2192 ${d.target.label}</div>`
        + `<div class="tt-eq">${d.equation}</div>`
        + (d.extra ? `<div class="tt-val">${d.extra}</div>` : '');
      showTooltip(evt, html);
    })
    .on('mousemove', function(evt) {
      tooltip
        .style('left', Math.min(evt.pageX + 14, window.innerWidth - 380) + 'px')
        .style('top', (evt.pageY - 20) + 'px');
    })
    .on('mouseout', function() {
      d3.select(this).attr('stroke-opacity', 0.45);
      hideTooltip();
    });

  // Nodes
  const nodeG = g.append('g')
    .selectAll('g')
    .data(graph.nodes)
    .join('g');

  // Node rectangles with glow
  nodeG.append('rect')
    .attr('x', d => d.x0)
    .attr('y', d => d.y0)
    .attr('height', d => Math.max(1, d.y1 - d.y0))
    .attr('width', d => d.x1 - d.x0)
    .attr('fill', d => d.color)
    .attr('rx', 3)
    .attr('ry', 3)
    .style('filter', d => `drop-shadow(0 0 6px ${d.color}55)`)
    .style('cursor', 'pointer')
    .on('mouseover', function(evt, d) {
      d3.select(this).style('filter', `drop-shadow(0 0 14px ${d.color}aa)`);

      // Prediction tooltips
      if (d.col === 3) {
        const predData = getPredTooltip(d.id);
        if (predData) {
          showTooltip(evt, predData);
        }
      } else {
        const html = `<div class="tt-title">${d.label}</div>`
          + `<div style="color:#888; font-size:12px;">${getNodeDesc(d.id)}</div>`;
        showTooltip(evt, html);
      }
    })
    .on('mousemove', function(evt) {
      tooltip
        .style('left', Math.min(evt.pageX + 14, window.innerWidth - 380) + 'px')
        .style('top', (evt.pageY - 20) + 'px');
    })
    .on('mouseout', function() {
      d3.select(this).style('filter', d => `drop-shadow(0 0 6px ${d.color}55)`);
      hideTooltip();
    });

  // Node labels
  nodeG.append('text')
    .attr('x', d => d.col < 3 ? d.x1 + 8 : d.x1 + 8)
    .attr('y', d => (d.y0 + d.y1) / 2)
    .attr('dy', '0.35em')
    .attr('text-anchor', 'start')
    .attr('fill', d => {
      if (d.col === 3) return d.color;
      return '#ccc';
    })
    .attr('font-size', d => d.col === 0 ? '14px' : d.col === 3 ? '11px' : '12px')
    .attr('font-weight', d => d.col === 0 ? 700 : d.col === 3 ? 500 : 600)
    .attr('font-family', d => d.col === 0 ? "'Courier New', monospace" : 'inherit')
    .text(d => d.label);

  // Add count badge for predictions
  const predCount = graph.nodes.filter(d => d.col === 3).length;
  svg.append('text')
    .attr('x', fullW - 16)
    .attr('y', fullH - 8)
    .attr('text-anchor', 'end')
    .attr('fill', '#444')
    .attr('font-size', '11px')
    .text(`${predCount} predictions from 2 integers`);
}
